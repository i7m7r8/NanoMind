name: Train NanoMind

on:
  workflow_dispatch:
    inputs:
      model_size:
        description: 'Size: ci(fast test 1M) | nano(135M) | mini(360M)'
        required: true
        default: 'ci'
      steps:
        description: 'Training steps (ci=500, nano=50000, mini=100000)'
        required: true
        default: '500'
      lr:
        description: 'Peak learning rate'
        required: true
        default: '0.0003'
      data_mode:
        description: 'Data: builtin | security'
        required: true
        default: 'security'

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "nanomind-train"

      - name: Set model hyperparameters
        id: hparams
        run: |
          case "${{ github.event.inputs.model_size }}" in
            nano)  echo "HIDDEN=768;LAYERS=12;HEADS=12;KV=4;FFN=2048;SEQ=512;VOCAB=1024" >> $GITHUB_OUTPUT ;;
            mini)  echo "HIDDEN=1024;LAYERS=24;HEADS=16;KV=4;FFN=2752;SEQ=512;VOCAB=2048" >> $GITHUB_OUTPUT ;;
            ci)    echo "HIDDEN=256;LAYERS=4;HEADS=4;KV=2;FFN=512;SEQ=64;VOCAB=260" >> $GITHUB_OUTPUT ;;
          esac

      - name: Prepare training data
        run: |
          mkdir -p data/raw
          if [ "${{ github.event.inputs.data_mode }}" = "security" ]; then
            bash data/prepare.sh || true
            cat data/instruct.txt 2>/dev/null >> data/corpus.txt || true
          fi
          if [ ! -s data/corpus.txt ] || [ $(wc -c < data/corpus.txt) -lt 1000 ]; then
            echo "Using built-in corpus"
            echo "fallback" > data/corpus.txt
          fi
          echo "Corpus: $(wc -c < data/corpus.txt 2>/dev/null || echo 0) bytes"

      - name: Build trainer
        run: cargo build --release --package nanomind-trainer

      - name: Train model
        env:
          HIDDEN: ${{ steps.hparams.outputs.HIDDEN }}
          LAYERS:  ${{ steps.hparams.outputs.LAYERS }}
          HEADS:   ${{ steps.hparams.outputs.HEADS }}
          KV:      ${{ steps.hparams.outputs.KV }}
          FFN:     ${{ steps.hparams.outputs.FFN }}
          SEQ:     ${{ steps.hparams.outputs.SEQ }}
          VOCAB:   ${{ steps.hparams.outputs.VOCAB }}
        run: |
          cargo run --release --package nanomind-trainer -- train \
            --steps   ${{ github.event.inputs.steps }} \
            --lr      ${{ github.event.inputs.lr }} \
            --vocab   $VOCAB \
            --hidden  $HIDDEN \
            --layers  $LAYERS \
            --heads   $HEADS \
            --kv-heads $KV \
            --ffn     $FFN \
            --seq-len $SEQ \
            --corpus  data/corpus.txt \
            --out     nanomind-${{ github.event.inputs.model_size }}.gguf

      - name: Generate Modelfile
        run: |
          cat > Modelfile.trained << 'MEOF'
          FROM ./nanomind-model.gguf

          PARAMETER temperature 0.7
          PARAMETER top_p 0.9
          PARAMETER top_k 40
          PARAMETER repeat_penalty 1.1
          PARAMETER num_ctx 2048
          PARAMETER stop "<|eos|>"
          PARAMETER stop "<|user|>"

          SYSTEM """You are NanoMind, an AI assistant specialized in cybersecurity,
          ethical hacking, Linux administration, Rust/Python programming, and CTF
          challenges. You provide accurate technical information for learning and
          authorized security testing."""

          TEMPLATE """{{ if .System }}<|sys|>
          {{ .System }}<|eos|>
          {{ end }}<|user|>
          {{ .Prompt }}<|eos|>
          <|assistant|>
          {{ .Response }}<|eos|>
          """
          MEOF

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nanomind-${{ github.event.inputs.model_size }}-${{ github.run_number }}
          path: |
            nanomind-${{ github.event.inputs.model_size }}.gguf
            Modelfile.trained
          retention-days: 30

      - name: Summary
        run: |
          echo "## Training Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Size: ${{ github.event.inputs.model_size }}" >> $GITHUB_STEP_SUMMARY
          echo "- Steps: ${{ github.event.inputs.steps }}" >> $GITHUB_STEP_SUMMARY
          if [ -f nanomind-${{ github.event.inputs.model_size }}.gguf ]; then
            echo "- GGUF: $(du -h nanomind-${{ github.event.inputs.model_size }}.gguf | cut -f1)" >> $GITHUB_STEP_SUMMARY
          fi
