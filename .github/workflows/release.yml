name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  train-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Download training data
        run: |
          mkdir -p data/raw
          curl -sL "https://www.gutenberg.org/cache/epub/11/pg11.txt" -o data/raw/alice.txt
          curl -sL "https://www.gutenberg.org/cache/epub/100/pg100.txt" -o data/raw/shakespeare.txt
          curl -sL "https://www.gutenberg.org/cache/epub/132/pg132.txt" -o data/raw/artofwar.txt
          cat data/raw/*.txt > data/corpus.txt
          echo "Corpus: $(wc -c < data/corpus.txt) bytes"

      - name: Build trainer
        run: cargo build --release --package nanomind-trainer

      - name: Train model
        run: |
          cargo run --release --package nanomind-trainer -- \
            train \
            --steps 1000 \
            --lr 0.001 \
            --vocab 260 \
            --hidden 128 \
            --layers 4 \
            --heads 4 \
            --seq-len 32 \
            --out nanomind.gguf

      - name: Create Modelfile
        run: |
          cat > Modelfile << 'EOF'
          FROM ./nanomind.gguf

          PARAMETER temperature 0.7
          PARAMETER top_p 0.9
          PARAMETER top_k 40
          PARAMETER repeat_penalty 1.1
          PARAMETER num_ctx 256
          PARAMETER stop "<|eos|>"

          SYSTEM """You are NanoMind, a small AI assistant trained from scratch in pure Rust."""
          EOF

      - name: Package release
        run: |
          mkdir -p release
          cp nanomind.gguf release/nanomind.gguf
          cp Modelfile release/Modelfile
          cd release
          tar czf nanomind-v${{ github.ref_name }}.tar.gz nanomind.gguf Modelfile
          sha256sum nanomind-v${{ github.ref_name }}.tar.gz > nanomind-v${{ github.ref_name }}.tar.gz.sha256
          ls -lh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/nanomind.gguf
            release/Modelfile
            release/nanomind-v${{ github.ref_name }}.tar.gz
            release/nanomind-v${{ github.ref_name }}.tar.gz.sha256
          generate_release_notes: true
          body: |
            # NanoMind ${{ github.ref_name }}

            A language model trained from scratch in pure Rust, output as GGUF for Ollama.

            ## Install

            ```bash
            # Download the model
            tar xzf nanomind-v${{ github.ref_name }}.tar.gz

            # Import into Ollama
            ollama create nanomind -f Modelfile

            # Chat
            ollama run nanomind
            ```

            ## Model Details

            - **Architecture:** Transformer (GQA, SwiGLU, RoPE, RMSNorm)
            - **Vocab:** 260 (byte-level)
            - **Hidden dim:** 128
            - **Layers:** 4
            - **Heads:** 4
            - **Sequence length:** 32
            - **Parameters:** ~2M
            - **Training data:** Public domain books (Alice, Shakespeare, Art of War)
            - **Framework:** Pure Rust, autodiff backprop, AdamW optimizer
            - **Runs on:** Any platform with Ollama or llama.cpp
