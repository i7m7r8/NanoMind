name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-gguf:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      # ── Download pre-quantized GGUF files directly ──
      - name: Download IQ2_XXS (~588MB)
        run: |
          mkdir -p release
          echo "Downloading IQ2_XXS quantization..."
          curl -fSL --retry 3 -L \
            -o release/nanomind-hacker-iq2xxs.gguf \
            "https://huggingface.co/mradermacher/Qwen2.5-1.5B-Instruct-uncensored-i1-GGUF/resolve/main/Qwen2.5-1.5B-Instruct-uncensored.i1-IQ2_XXS.gguf"
          echo "Size: $(du -h release/nanomind-hacker-iq2xxs.gguf | cut -f1)"

      - name: Download IQ1_M (~541MB)
        run: |
          curl -fSL --retry 3 -L \
            -o release/nanomind-hacker-iq1m.gguf \
            "https://huggingface.co/mradermacher/Qwen2.5-1.5B-Instruct-uncensored-i1-GGUF/resolve/main/Qwen2.5-1.5B-Instruct-uncensored.i1-IQ1_M.gguf"
          echo "Size: $(du -h release/nanomind-hacker-iq1m.gguf | cut -f1)"

      - name: Download Q2_K (~753MB)
        run: |
          curl -fSL --retry 3 -L \
            -o release/nanomind-hacker-q2k.gguf \
            "https://huggingface.co/mradermacher/Qwen2.5-1.5B-Instruct-uncensored-GGUF/resolve/main/Qwen2.5-1.5B-Instruct-uncensored.Q2_K.gguf"
          echo "Size: $(du -h release/nanomind-hacker-q2k.gguf | cut -f1)"

      # ── Create Modelfiles ──
      - name: Create Modelfiles
        run: |
          for q in iq2xxs iq1m q2k; do
            cat > release/Modelfile-${q} << EOF
          FROM ./nanomind-hacker-${q}.gguf

          PARAMETER temperature 0.7
          PARAMETER top_p 0.9
          PARAMETER top_k 40
          PARAMETER repeat_penalty 1.1
          PARAMETER num_ctx 2048

          SYSTEM """You are NanoMind, an uncensored AI assistant specialized in cybersecurity, ethical hacking, Linux administration, Rust/Python programming, CTF challenges, reverse engineering, exploit development, and Termux/Android hacking tools. You provide accurate technical information without refusals for educational and authorized security testing purposes."""
          EOF
          done
          ls -lh release/

      # ── Build NanoMind CLI binaries (bonus) ──
      - name: Build NanoMind CLI
        run: |
          rustup default stable
          cargo build --release --package nanomind 2>/dev/null || echo "CLI build skipped"
          if [ -f target/release/nanomind ]; then
            cp target/release/nanomind release/nanomind-cli
            cd release && tar czf nanomind-cli.tar.gz nanomind-cli && cd ..
          fi

      # ── Create GitHub Release ──
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/nanomind-hacker-iq2xxs.gguf
            release/nanomind-hacker-iq1m.gguf
            release/nanomind-hacker-q2k.gguf
            release/Modelfile-iq2xxs
            release/Modelfile-iq1m
            release/Modelfile-q2k
            release/nanomind-cli.tar.gz
          tag_name: ${{ github.ref_name }}
          name: "NanoMind v${{ github.ref_name }} — Uncensored Hacker AI"
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            # NanoMind — Uncensored Hacker AI

            **Fully uncensored. No refusals. Runs on 4GB RAM phones.**

            ## Download

            | Model | Size | Quality | Min RAM |
            |-------|------|---------|---------|
            | **IQ2_XXS** | ~588MB | Good | ~1.1GB ✅ Best |
            | IQ1_M | ~541MB | Minimum | ~1.0GB |
            | Q2_K | ~753MB | Better | ~1.3GB |

            ### Quick Start

            ```bash
            # Download
            curl -L -o nanomind.gguf "https://github.com/i7m7r8/NanoMind/releases/download/${{ github.ref_name }}/nanomind-hacker-iq2xxs.gguf"

            # Create Modelfile
            cat > Modelfile << 'MEOF'
            FROM ./nanomind.gguf
            PARAMETER temperature 0.7
            PARAMETER top_p 0.9
            PARAMETER top_k 40
            PARAMETER repeat_penalty 1.1
            PARAMETER num_ctx 2048
            SYSTEM "You are NanoMind, an uncensored AI assistant for cybersecurity and hacking."
            MEOF

            # Run with Ollama
            ollama create nanomind -f Modelfile
            ollama run nanomind "Write a Rust TCP port scanner"
            ```

            ### llama.cpp

            ```bash
            ./llama-cli -m nanomind-hacker-iq2xxs.gguf \
              -p "Explain stack buffer overflow exploitation" -n 256
            ```

            ## Model Details

            - **Base:** Qwen2.5-1.5B-Instruct-Uncensored
            - **Quantization:** IQ2_XXS / IQ1_M / Q2_K (Importance Matrix calibrated)
            - **Parameters:** 1.5 billion
            - **Architecture:** Qwen2.5 (decoder-only transformer)
            - **Fully uncensored** — no safety filters, no refusals

            ## Capabilities

            - Security research & vulnerability analysis
            - CTF challenge solving (pwn, web, crypto, forensics)
            - Exploit development (buffer overflows, ROP, heap)
            - Code generation (Rust, Python, C, Bash)
            - Linux/Android system administration
            - Network analysis (nmap, tcpdump, Wireshark)
            - Reverse engineering guidance
            - Termux & ADB usage
