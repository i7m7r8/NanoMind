name: Release NanoMind

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-gguf:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "TAG=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "IS_PRERELEASE=false" >> $GITHUB_OUTPUT
          else
            echo "TAG=latest" >> $GITHUB_OUTPUT
            echo "IS_PRERELEASE=true" >> $GITHUB_OUTPUT
          fi

      - name: Download IQ1_S (513 MB)
        run: |
          mkdir -p release
          curl -L --retry 5 --retry-delay 10 --retry-all-errors -C - \
            -H "User-Agent: Mozilla/5.0" \
            -o release/nanomind-hacker-iq1s.gguf \
            "https://huggingface.co/mradermacher/Qwen2.5-1.5B-Instruct-uncensored-i1-GGUF/resolve/main/Qwen2.5-1.5B-Instruct-uncensored.i1-IQ1_S.gguf" \
            || echo "WARNING: IQ1_S failed"
          [ $(stat -c%s release/nanomind-hacker-iq1s.gguf 2>/dev/null || echo 0) -gt 10000000 ] \
            && echo "OK: $(du -h release/nanomind-hacker-iq1s.gguf)" \
            || rm -f release/nanomind-hacker-iq1s.gguf

      - name: Download IQ1_M (541 MB)
        run: |
          curl -L --retry 5 --retry-delay 10 --retry-all-errors -C - \
            -H "User-Agent: Mozilla/5.0" \
            -o release/nanomind-hacker-iq1m.gguf \
            "https://huggingface.co/mradermacher/Qwen2.5-1.5B-Instruct-uncensored-i1-GGUF/resolve/main/Qwen2.5-1.5B-Instruct-uncensored.i1-IQ1_M.gguf" \
            || echo "WARNING: IQ1_M failed"
          [ $(stat -c%s release/nanomind-hacker-iq1m.gguf 2>/dev/null || echo 0) -gt 10000000 ] \
            && echo "OK: $(du -h release/nanomind-hacker-iq1m.gguf)" \
            || rm -f release/nanomind-hacker-iq1m.gguf

      - name: Download IQ2_XXS (588 MB — recommended)
        run: |
          curl -L --retry 5 --retry-delay 10 --retry-all-errors -C - \
            -H "User-Agent: Mozilla/5.0" \
            -o release/nanomind-hacker-iq2xxs.gguf \
            "https://huggingface.co/mradermacher/Qwen2.5-1.5B-Instruct-uncensored-i1-GGUF/resolve/main/Qwen2.5-1.5B-Instruct-uncensored.i1-IQ2_XXS.gguf" \
            || echo "WARNING: IQ2_XXS failed"
          [ $(stat -c%s release/nanomind-hacker-iq2xxs.gguf 2>/dev/null || echo 0) -gt 10000000 ] \
            && echo "OK: $(du -h release/nanomind-hacker-iq2xxs.gguf)" \
            || rm -f release/nanomind-hacker-iq2xxs.gguf

      - name: Download IQ2_XS (627 MB)
        run: |
          curl -L --retry 5 --retry-delay 10 --retry-all-errors -C - \
            -H "User-Agent: Mozilla/5.0" \
            -o release/nanomind-hacker-iq2xs.gguf \
            "https://huggingface.co/mradermacher/Qwen2.5-1.5B-Instruct-uncensored-i1-GGUF/resolve/main/Qwen2.5-1.5B-Instruct-uncensored.i1-IQ2_XS.gguf" \
            || echo "WARNING: IQ2_XS failed"
          [ $(stat -c%s release/nanomind-hacker-iq2xs.gguf 2>/dev/null || echo 0) -gt 10000000 ] \
            && echo "OK: $(du -h release/nanomind-hacker-iq2xs.gguf)" \
            || rm -f release/nanomind-hacker-iq2xs.gguf

      - name: Download Q2_K (753 MB)
        run: |
          curl -L --retry 5 --retry-delay 10 --retry-all-errors -C - \
            -H "User-Agent: Mozilla/5.0" \
            -o release/nanomind-hacker-q2k.gguf \
            "https://huggingface.co/mradermacher/Qwen2.5-1.5B-Instruct-uncensored-i1-GGUF/resolve/main/Qwen2.5-1.5B-Instruct-uncensored.i1-Q2_K.gguf" \
            || echo "WARNING: Q2_K failed"
          [ $(stat -c%s release/nanomind-hacker-q2k.gguf 2>/dev/null || echo 0) -gt 10000000 ] \
            && echo "OK: $(du -h release/nanomind-hacker-q2k.gguf)" \
            || rm -f release/nanomind-hacker-q2k.gguf

      - name: Create Modelfiles
        run: |
          SYSTEM="You are a helpful AI assistant for cybersecurity, Linux, Rust, Python, CTF challenges, and Termux tools. Provide accurate technical information for learning and authorized security testing."
          for q in iq1s iq1m iq2xxs iq2xs q2k; do
            [ -f "release/nanomind-hacker-${q}.gguf" ] || continue
            { echo "FROM ./nanomind-hacker-${q}.gguf"
              echo "PARAMETER temperature 0.3"
              echo "PARAMETER top_k 20"
              echo "PARAMETER top_p 0.85"
              echo "PARAMETER repeat_penalty 1.15"
              echo "PARAMETER num_ctx 512"
              echo "PARAMETER num_predict 256"
              echo 'PARAMETER stop "</s>"'
              echo "SYSTEM \"${SYSTEM}\""
            } > "release/Modelfile-${q}"
          done
          echo "=== Modelfile content check ==="
          cat release/Modelfile-iq2xxs 2>/dev/null || echo "not found"
          echo "=== All release files ==="
          ls -lh release/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: "NanoMind ${{ steps.tag.outputs.TAG }}"
          prerelease: ${{ steps.tag.outputs.IS_PRERELEASE }}
          draft: false
          generate_release_notes: false
          fail_on_unmatched_files: false
          files: |
            release/*.gguf
            release/Modelfile-*
          body: |
            # NanoMind — Hacker AI

            IQ Importance Matrix quantized. Runs on 4GB RAM phones.

            ## Recommended download: IQ2_XXS (588 MB)

            ```bash
            curl -L -C - -o ~/storage/downloads/nanomind.gguf \
              "https://github.com/i7m7r8/NanoMind/releases/download/${{ steps.tag.outputs.TAG }}/nanomind-hacker-iq2xxs.gguf"

            ollama rm nanomind 2>/dev/null
            cat > ~/Modelfile << 'EOF'
            FROM /data/data/com.termux/files/home/storage/downloads/nanomind.gguf
            PARAMETER temperature 0.3
            PARAMETER top_k 20
            PARAMETER top_p 0.85
            PARAMETER repeat_penalty 1.15
            PARAMETER num_ctx 512
            PARAMETER num_predict 256
            SYSTEM "You are a helpful AI assistant for cybersecurity, Linux, and programming."
            EOF
            ollama create nanomind -f ~/Modelfile
            ollama run nanomind
            ```

            | File | Size | RAM |
            |------|------|-----|
            | iq1s | ~513 MB | ~900 MB |
            | iq1m | ~541 MB | ~1.0 GB |
            | **iq2xxs** | **~588 MB** | **~1.1 GB** ✅ |
            | iq2xs | ~627 MB | ~1.2 GB |
            | q2k | ~753 MB | ~1.3 GB |
